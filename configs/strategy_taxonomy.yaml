competition: orbit-wars
audit_date: '2026-06-16'
families:
  nearest_expander:
    definition: Starter-like nearest neutral expansion with limited forward projection.
    public_prevalence: common in tutorials and low-signal notebooks
    counter: Outvalue it with production-discount scoring and punish overcommits/late defense.
  production_greedy_expander:
    definition: ROI / future production planner that sends only when capture/defense improves projected production.
    public_prevalence: very important public family after Producer release
    counter: Deny high-production targets, reinforce just-in-time, and exploit predictable ROI thresholds.
  distance_prioritized_rusher:
    definition: Prioritizes nearby opponents/frontiers and short-distance pressure, often on top of world-model code.
    public_prevalence: visible in ykhnkf lineage and descendants
    counter: Reserve against closest-front pressure and counterattack drained sources.
  center_control_agent:
    definition: Targets central/high-value orbital positions to control travel geometry.
    public_prevalence: weak direct evidence in sampled high-rank replays; exists as design idea
    counter: Treat center as contested only when production/ETA justifies it; do not over-reserve for low-value center planets.
  sun_dodge_physics_agent:
    definition: Focuses on safe aiming, sun collision checks, moving planet prediction, and valid intercepts.
    public_prevalence: broadly embedded in most strong public heuristics
    counter: Benchmark our own aimer; exploit agents that reject valid indirect shots or over-constrain sun safety.
  world_model_forecaster:
    definition: Maintains future ownership/garrison/arrival timelines and scores actions against projected state.
    public_prevalence: dominant in Pilkwang/Tamrazov/Yuriy/Sigmaborov-style public code
    counter: Create situations with reactive reinforcement/recapture not captured by static forecasts.
  defense_reinforcement_agent:
    definition: Detects threatened planets and sends reinforcements/rescues/recaptures.
    public_prevalence: very common in strong public agents
    counter: Use multi-source or delayed recapture windows; attack support planets after defense drains.
  multi_source_gangup_agent:
    definition: Coordinates several source planets against one target, often to hit same ETA or overwhelm garrison.
    public_prevalence: visible in layered public agents and some replay samples
    counter: Identify converging fleets early, reinforce target or counterattack depleted sources.
  comet_greedy_agent:
    definition: Prioritizes comet-spawned temporary planets or times actions around comet windows.
    public_prevalence: uneven; comet logic is common but primary comet greed is less universal
    counter: Preposition before spawn windows and avoid overpaying for low-lifetime comet planets.
  big_stack_hammer:
    definition: Aggregates large fleets/stacks to make hard-to-react attacks or hammer key targets.
    public_prevalence: explicit in vkhydras archive and discussion comments
    counter: Anti-stack reinforcement, source disruption, and target evacuation/recapture.
  total_war_endgame_agent:
    definition: Late-game all-in or total-war mode when remaining turns make reserves less valuable.
    public_prevalence: embedded in layered public agents but not visible in sampled short high-rank replays
    counter: Recognize remaining-turn threshold and mirror/evacuate rather than over-defend doomed planets.
  crash_exploit_or_collision_agent:
    definition: Uses simultaneous enemy collisions, post-crash snipes, or old collision/path quirks.
    public_prevalence: crash exploit logic appears in Pilkwang/Yuriy descriptions; old engine bugs fixed
    counter: Avoid predictable simultaneous arrivals and update local env to current collision rules.
  turtle_defender:
    definition: Conservative reserve-heavy/economic turtle with defense and counterattack emphasis.
    public_prevalence: appears in replay dataset clustering language and defense-heavy code, but not a single dominant public release
    counter: Out-expand production, force inefficient reserves, and attack multiple fronts.
  RL_policy_agent:
    definition: PPO/BC/neural/transformer policy trained from self-play or public replays.
    public_prevalence: active but high-cost; public code often training infrastructure rather than drop-in agents
    counter: Benchmark against neural policy families; exploit off-distribution and lookahead gaps.
  hybrid_layered_agent:
    definition: Combines physics, world model, expansion, defense, recapture, multi-source, comet and endgame layers.
    public_prevalence: largest high-value public family
    counter: Profiler must identify sub-behaviors rather than one broad hybrid label.
